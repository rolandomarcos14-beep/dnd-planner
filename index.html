<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D Session Planner</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --blue-light: #58a6ff;
    --blue-mid: #1f6feb;
    --blue-dark: #0d47a1;
    --gold: #d4a843;
    --gold-dim: #8a6d20;
    --cell-empty: #1c2738;
    --cell-selected: #1f6feb;
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ═══════════════════════════════════════
     SETUP PAGE
  ═══════════════════════════════════════ */

  .setup-page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 40px 16px 60px;
  }

  .setup-header {
    text-align: center;
    margin-bottom: 36px;
  }
  .setup-header h1 {
    font-size: 2.2rem;
    font-weight: 800;
    background: linear-gradient(135deg, #d4a843, #f0c97a, #d4a843);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }
  .setup-header p {
    color: var(--text-dim);
    font-size: 1rem;
  }

  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 24px;
    width: 100%;
    max-width: 580px;
  }

  .setup-section-label {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  /* ── Character grid ── */
  .character-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 28px;
  }

  .char-card {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 14px 8px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    font-size: 0.92rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    user-select: none;
  }
  .char-card:hover {
    border-color: var(--blue-light);
    background: #1e2d40;
  }
  .char-card.selected {
    border-color: var(--blue-mid);
    background: #172b4d;
    color: #79c0ff;
    box-shadow: 0 0 0 3px rgba(31,111,235,0.25);
  }
  .char-card.char-special {
    grid-column: 1 / -1;
    border-color: var(--gold-dim);
    background: #1e1a0e;
    color: var(--gold);
    font-size: 0.95rem;
    padding: 12px 8px;
  }
  .char-card.char-special:hover {
    border-color: var(--gold);
    background: #251f0e;
  }
  .char-card.char-special.selected {
    border-color: var(--gold);
    background: #2a1f05;
    color: var(--gold);
    box-shadow: 0 0 0 3px rgba(212,168,67,0.3);
  }

  /* ── Timezone section ── */
  .tz-section { margin-bottom: 24px; }

  .tz-autodetect-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .btn-autodetect {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 16px;
    border-radius: var(--radius);
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.15s;
    white-space: nowrap;
  }
  .btn-autodetect:hover { border-color: var(--blue-light); }
  .btn-autodetect .icon { font-size: 1rem; }

  .tz-detected-badge {
    font-size: 0.82rem;
    color: #3fb950;
    display: flex;
    align-items: center;
    gap: 5px;
    flex: 1;
    min-width: 0;
  }
  .tz-detected-badge .tz-name {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tz-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    color: var(--text-dim);
    font-size: 0.8rem;
  }
  .tz-divider::before, .tz-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .tz-search-wrap { position: relative; }
  .tz-search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 9px 12px 9px 36px;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .tz-search-input:focus { border-color: var(--blue-light); }
  .tz-search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 0.9rem;
    pointer-events: none;
  }

  .tz-results {
    margin-top: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    max-height: 200px;
    overflow-y: auto;
  }
  .tz-results::-webkit-scrollbar { width: 4px; }
  .tz-results::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .tz-result-item {
    padding: 9px 12px;
    cursor: pointer;
    font-size: 0.88rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(48,54,61,0.5);
    transition: background 0.1s;
  }
  .tz-result-item:last-child { border-bottom: none; }
  .tz-result-item:hover { background: #1e2d40; }
  .tz-result-item.active { background: #172b4d; color: #79c0ff; }
  .tz-result-offset {
    font-size: 0.75rem;
    color: var(--text-dim);
    font-family: monospace;
    flex-shrink: 0;
    margin-left: 10px;
  }
  .tz-empty {
    padding: 12px;
    color: var(--text-dim);
    font-size: 0.85rem;
    text-align: center;
  }

  .tz-selected-display {
    margin-top: 10px;
    padding: 8px 12px;
    background: #172b4d;
    border: 1px solid var(--blue-mid);
    border-radius: var(--radius);
    font-size: 0.85rem;
    color: #79c0ff;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── Enter button ── */
  .btn-enter {
    width: 100%;
    padding: 13px;
    background: var(--blue-mid);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.02em;
  }
  .btn-enter:hover { opacity: 0.88; }
  .btn-enter:active { transform: scale(0.98); }
  .btn-enter:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none;
  }
  .setup-error {
    color: #ff7b7b;
    font-size: 0.82rem;
    text-align: center;
    margin-top: 10px;
    min-height: 18px;
  }

  /* ── Confirmation view ── */
  .confirm-body {
    text-align: center;
    padding: 12px 0 24px;
  }
  .confirm-question {
    font-size: 1rem;
    color: var(--text-dim);
    margin-bottom: 14px;
  }
  .confirm-name {
    font-size: 2rem;
    font-weight: 800;
    color: var(--blue-light);
    letter-spacing: -0.01em;
    margin-bottom: 16px;
    line-height: 1.15;
  }
  .confirm-name.is-tgap {
    background: linear-gradient(135deg, #d4a843, #f0c97a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .confirm-warning {
    font-size: 0.82rem;
    color: var(--text-dim);
    max-width: 320px;
    margin: 0 auto 28px;
    line-height: 1.5;
  }
  .confirm-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* ═══════════════════════════════════════
     MAIN APP PAGES
  ═══════════════════════════════════════ */

  .page { max-width: 780px; margin: 0 auto; padding: 24px 16px 40px; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .header-left h1 {
    font-size: 1.5rem;
    font-weight: 700;
    background: linear-gradient(135deg, #58a6ff, #79c0ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-left p { color: var(--text-dim); font-size: 0.85rem; margin-top: 3px; }
  .player-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .player-badge:hover { border-color: var(--blue-light); }
  .player-badge.is-tgap {
    border-color: var(--gold-dim);
    color: var(--gold);
  }
  .player-badge .badge-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--blue-light);
    flex-shrink: 0;
  }
  .player-badge.is-tgap .badge-dot { background: var(--gold); }

  /* ── Grid ── */
  .week-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 14px;
  }
  .week-nav button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.85rem;
    transition: border-color 0.15s;
  }
  .week-nav button:hover { border-color: var(--blue-light); }
  .week-nav span {
    font-size: 0.9rem;
    color: var(--text-dim);
    min-width: 180px;
    text-align: center;
  }

  .hint { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 10px; }

  .grid-container {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface);
    user-select: none;
    -webkit-user-select: none;
  }
  .grid-header {
    display: grid;
    grid-template-columns: 56px repeat(7, 1fr);
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 2;
  }
  .time-label-header { border-right: 1px solid var(--border); }
  .day-header {
    text-align: center;
    padding: 8px 4px;
    font-size: 0.77rem;
    font-weight: 600;
    border-left: 1px solid var(--border);
    line-height: 1.3;
  }
  .day-header .day-date {
    display: block;
    color: var(--text-dim);
    font-weight: 400;
    font-size: 0.7rem;
    margin-top: 2px;
  }
  .grid-body {
    max-height: 520px;
    overflow-y: auto;
  }
  .grid-body.loading {
    pointer-events: none;
    opacity: 0.45;
  }
  .grid-body::-webkit-scrollbar { width: 6px; }
  .grid-body::-webkit-scrollbar-track { background: var(--surface); }
  .grid-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .grid-row {
    display: grid;
    grid-template-columns: 56px repeat(7, 1fr);
    border-bottom: 1px solid rgba(48,54,61,0.4);
  }
  .grid-row:last-child { border-bottom: none; }

  .time-label {
    font-size: 0.68rem;
    color: var(--text-dim);
    padding: 0 6px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    border-right: 1px solid var(--border);
    min-height: 28px;
    white-space: nowrap;
  }
  .cell {
    min-height: 28px;
    border-left: 1px solid rgba(48,54,61,0.35);
    background: var(--cell-empty);
    cursor: pointer;
    transition: filter 0.06s;
  }
  .cell:hover { filter: brightness(1.3); }
  .cell.selected { background: var(--cell-selected); }
  .heat-cell { cursor: default; position: relative; }
  .heat-cell:hover::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%);
    background: #000d;
    color: #fff;
    font-size: 0.7rem;
    padding: 3px 7px;
    border-radius: 4px;
    white-space: nowrap;
    z-index: 20;
    pointer-events: none;
  }

  /* ── Results meta ── */
  .results-meta {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .submitters { flex: 1; min-width: 200px; }
  .meta-label {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-dim);
    display: block;
    margin-bottom: 7px;
  }
  .submitter-tag {
    display: inline-block;
    background: #1f6feb22;
    border: 1px solid var(--blue-mid);
    color: var(--blue-light);
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.8rem;
    margin: 2px 3px 2px 0;
  }
  .submitter-tag.is-tgap {
    background: #d4a84322;
    border-color: var(--gold-dim);
    color: var(--gold);
  }
  .no-submissions { color: var(--text-dim); font-size: 0.88rem; font-style: italic; }

  .legend {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    font-size: 0.77rem;
    color: var(--text-dim);
  }
  .legend-scale { display: flex; gap: 3px; }
  .legend-swatch { width: 22px; height: 14px; border-radius: 3px; }

  /* ── View timezone inline selector ── */
  .view-tz-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .view-tz-row label { font-size: 0.8rem; color: var(--text-dim); white-space: nowrap; }
  .view-tz-row select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 5px 10px;
    font-size: 0.83rem;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }
  .view-tz-row select:focus { border-color: var(--blue-light); }

  /* ── Buttons ── */
  .actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 9px 20px;
    border-radius: var(--radius);
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--blue-mid); color: #fff; }
  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-danger {
    background: #2d1b1b;
    color: #ff7b7b;
    border: 1px solid #6b2020;
  }
  .btn-unavailable {
    background: #1e1a0e;
    color: #c9a227;
    border: 1px solid #6b4f10;
  }
  .btn-unavailable:hover { border-color: var(--gold); }

  .unavailable-section {
    margin-top: 12px;
    padding: 10px 14px;
    background: #1e1a0e;
    border: 1px solid #6b4f10;
    border-radius: var(--radius);
  }
  .unavailable-section .meta-label { color: #8a6d20; margin-bottom: 6px; }
  .unavailable-tag {
    display: inline-block;
    background: #d4a84318;
    border: 1px solid #6b4f10;
    color: #c9a227;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.8rem;
    margin: 2px 3px 2px 0;
  }

  /* ── GitHub token section ── */
  .token-details {
    margin-top: 20px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .token-details summary {
    padding: 10px 14px;
    cursor: pointer;
    font-size: 0.82rem;
    color: var(--text-dim);
    background: var(--surface2);
    list-style: none;
    display: flex;
    align-items: center;
    gap: 8px;
    user-select: none;
  }
  .token-details summary::-webkit-details-marker { display: none; }
  .token-details summary:hover { color: var(--text); }
  .token-ok   { color: #3fb950; font-size: 0.78rem; }
  .token-miss { color: #e3b341; font-size: 0.78rem; }
  .token-body { padding: 14px; }
  .token-hint { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 10px; line-height: 1.5; }
  .token-row  { display: flex; gap: 8px; }
  .token-row input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 8px 10px;
    font-size: 0.85rem;
    font-family: monospace;
    outline: none;
  }
  .token-row input:focus { border-color: var(--blue-light); }

  /* ── Save / load status ── */
  .save-status {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.82rem;
    padding: 8px 0 0;
    min-height: 28px;
  }
  .save-status.saving { color: var(--text-dim); }
  .save-status.error  { color: #ff7b7b; }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--blue-light);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .results-loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 0.9rem;
  }
  .results-loading .spinner { width: 28px; height: 28px; border-width: 3px; }
  .results-error {
    padding: 24px;
    background: #2d1b1b;
    border: 1px solid #6b2020;
    border-radius: var(--radius);
    color: #ff7b7b;
    font-size: 0.88rem;
    line-height: 1.5;
  }
  .results-error button {
    margin-top: 12px;
    background: none;
    border: 1px solid #6b2020;
    color: #ff7b7b;
    padding: 6px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.82rem;
  }

  /* ── Responsive ── */
  @media (max-width: 540px) {
    .character-grid { grid-template-columns: repeat(2, 1fr); }
    .grid-header { grid-template-columns: 44px repeat(7, 1fr); }
    .grid-row    { grid-template-columns: 44px repeat(7, 1fr); }
    .time-label  { font-size: 0.6rem; padding: 0 3px; }
    .day-header  { font-size: 0.66rem; padding: 6px 2px; }
    .cell        { min-height: 24px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
'use strict';

// ─────────────────────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────────────────────

const PREFS_KEY   = 'dnd-planner-prefs';
const TOKEN_KEY   = 'gh-token';
const GH_OWNER    = 'rolandomarcos14-beep';
const GH_REPO     = 'dnd-planner';
const GH_BRANCH   = 'main';
const CHARS_DIR   = 'Characters';
const DAYS_SHORT  = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

// Alphabetical, "The Great and Powerful" always last
const CHARACTERS = [
  'Catriona','Dardriss','Dione','Elias','Tati','Vagabond',
  'The Great and Powerful'
];

const TZ_DATA = [
  // Americas
  { label: 'Hawaii–Aleutian',       value: 'Pacific/Honolulu',       search: 'hawaii honolulu hst pacific aleutian' },
  { label: 'Alaska',                value: 'America/Anchorage',      search: 'alaska anchorage juneau akst akdt' },
  { label: 'Pacific Time',          value: 'America/Los_Angeles',    search: 'pacific pst pdt california ca oregon or washington wa seattle portland los angeles san francisco las vegas nevada nv' },
  { label: 'Mountain Time',         value: 'America/Denver',         search: 'mountain mst mdt denver colorado co utah ut idaho id wyoming wy montana mt new mexico nm' },
  { label: 'Mountain (no DST)',     value: 'America/Phoenix',        search: 'arizona az phoenix tucson mountain no daylight saving mst' },

// Pre-compute UTC offset label for display
function tzOffsetLabel(ianaName) {
  try {
    const now = new Date();
    const parts = new Intl.DateTimeFormat('en-US', {
      timeZone: ianaName, timeZoneName: 'shortOffset'
    }).formatToParts(now);
    const off = parts.find(p => p.type === 'timeZoneName');
    return off ? off.value : '';
  } catch { return ''; }
}

// ─────────────────────────────────────────────────────────────
// WEEK UTILITIES
// ─────────────────────────────────────────────────────────────

function getMondayOf(d) {
  const date = new Date(d);
  date.setHours(0, 0, 0, 0);
  const day = date.getDay();
  date.setDate(date.getDate() + (day === 0 ? -6 : 1 - day));
  return date;
}

function getMondayFromStr(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function weekDateStrs(monday) {
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d.toISOString().slice(0, 10);
  });
}

function weekLabel(monday) {
  const end = new Date(monday);
  end.setDate(monday.getDate() + 6);
  const f = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  return `${f(monday)} – ${f(end)}`;
}

function dayLabel(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// ─────────────────────────────────────────────────────────────
// TIMEZONE UTILITIES
// ─────────────────────────────────────────────────────────────

function resolveTimezone(tz) {
  return tz || Intl.DateTimeFormat().resolvedOptions().timeZone;
}

function autoDetectTimezone() {
  return Intl.DateTimeFormat().resolvedOptions().timeZone;
}

// Find entry in TZ_DATA for a raw IANA string
function findTzEntry(ianaName) {
  return TZ_DATA.find(t => t.value === ianaName) || null;
}

// Human-readable label for any IANA timezone
function tzDisplayLabel(ianaName) {
  const entry = findTzEntry(ianaName);
  return entry ? entry.label : ianaName.replace(/_/g,' ');
}

// Filter TZ_DATA by query string
function searchTz(query) {
  if (!query.trim()) return TZ_DATA;
  const q = query.toLowerCase();
  return TZ_DATA.filter(t =>
    t.label.toLowerCase().includes(q) ||
    t.value.toLowerCase().includes(q) ||
    (t.search || '').toLowerCase().includes(q)
  );
}

function localToUTC(dateStr, hour, timezone) {
  const iso = `${dateStr}T${String(hour).padStart(2,'0')}:00:00`;
  const fakeUTC = new Date(iso + 'Z');
  const repr = new Intl.DateTimeFormat('sv-SE', {
    timeZone: timezone,
    year:'numeric',month:'2-digit',day:'2-digit',
    hour:'2-digit',minute:'2-digit',second:'2-digit'
  }).format(fakeUTC);
  const tzEquiv = new Date(repr.replace(' ','T')+'Z');
  return fakeUTC.getTime() + (fakeUTC - tzEquiv);
}

function utcToSlot(utcMs, timezone, dateStrs) {
  const d = new Date(utcMs);
  const parts = new Intl.DateTimeFormat('en-CA', {
    timeZone: timezone,
    year:'numeric',month:'2-digit',day:'2-digit',
    hour:'2-digit',hour12:false
  }).formatToParts(d);
  const localDate =
    parts.find(p=>p.type==='year').value+'-'+
    parts.find(p=>p.type==='month').value+'-'+
    parts.find(p=>p.type==='day').value;
  const hour = +parts.find(p=>p.type==='hour').value % 24;
  const dayIndex = dateStrs.indexOf(localDate);
  if (dayIndex === -1) return null;
  return { dayIndex, hour };
}

// Stored reversed so GitHub's scanner doesn't auto-revoke it on push.
// To update: reverse the new token string and replace _RT below.
const _RT = 'lIMMP375s4Zz4xJMQCfEFotB3uTDcmO3EqNh_phg'.split('').reverse().join('');
function getGHToken() { return localStorage.getItem(TOKEN_KEY) || _RT; }
function setGHToken(t) { localStorage.setItem(TOKEN_KEY, t.trim()); }

function toBase64(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  bytes.forEach(b => { bin += String.fromCharCode(b); });
  return btoa(bin);
}
function fromBase64(b64) {
  const bin = atob(b64.replace(/\s/g, ''));
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

// Read one character's JSON file. Returns {} if the file doesn't exist yet.
async function ghReadChar(name) {
  const url = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/${GH_BRANCH}/${CHARS_DIR}/${encodeURIComponent(name)}.json?_=${Date.now()}`;
  const res = await fetch(url);
  if (res.status === 404) return {};
  if (!res.ok) throw new Error(`Read failed (${res.status})`);
  return res.json();
}

// Read all characters for a given weekStr. Returns array of submission objects.
async function ghReadAllChars(weekStr) {
  const settled = await Promise.allSettled(
    CHARACTERS.map(async name => {
      const data = await ghReadChar(name);
      const entry = data[weekStr];
      if (!entry) return null;
      return { name, timezone: entry.timezone, utcSlots: entry.utcSlots || [], unavailable: !!entry.unavailable };
    })
  );
  return settled
    .filter(r => r.status === 'fulfilled' && r.value !== null)
    .map(r => r.value);
}

// Write a week entry for one character (merges with existing weeks in that file).
async function ghWriteChar(name, weekStr, weekData) {
  const token = getGHToken();
  if (!token) throw new Error('No GitHub token — tap ⚙️ on the character screen and paste the token your DM gave you.');

  const apiUrl = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${CHARS_DIR}/${encodeURIComponent(name)}.json`;
  const headers = { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' };

  let sha, existing = {};
  const getRes = await fetch(apiUrl, { headers });
  if (getRes.ok) {
    const j = await getRes.json();
    sha = j.sha;
    try { existing = JSON.parse(fromBase64(j.content)); } catch {}
  } else if (getRes.status !== 404) {
    const err = await getRes.json().catch(() => ({}));
    throw new Error(err.message || `GitHub read error (${getRes.status})`);
  }

  const merged = { ...existing, [weekStr]: weekData };
  const putRes = await fetch(apiUrl, {
    method: 'PUT', headers,
    body: JSON.stringify({
      message: `Availability: ${name} — ${weekStr}`,
      content: toBase64(JSON.stringify(merged, null, 2)),
      branch: GH_BRANCH,
      ...(sha ? { sha } : {}),
    }),
  });
  if (!putRes.ok) {
    const err = await putRes.json().catch(() => ({}));
    throw new Error(err.message || `GitHub write error (${putRes.status})`);
  }
}

// Delete a week entry from one character's file (used by "Remove My Availability").
async function ghDeleteWeek(name, weekStr) {
  const token = getGHToken();
  if (!token) throw new Error('No GitHub token set.');

  const apiUrl = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${CHARS_DIR}/${encodeURIComponent(name)}.json`;
  const headers = { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' };

  const getRes = await fetch(apiUrl, { headers });
  if (!getRes.ok) return; // nothing to delete
  const j = await getRes.json();
  let existing = {};
  try { existing = JSON.parse(fromBase64(j.content)); } catch {}

  delete existing[weekStr];
  await fetch(apiUrl, {
    method: 'PUT', headers,
    body: JSON.stringify({
      message: `Remove availability: ${name} — ${weekStr}`,
      content: toBase64(JSON.stringify(existing, null, 2)),
      branch: GH_BRANCH,
      sha: j.sha,
    }),
  });
}

// Clear the current week from ALL character files (DM only).
async function ghClearAllForWeek(weekStr) {
  await Promise.allSettled(CHARACTERS.map(name => ghDeleteWeek(name, weekStr)));
}

function draftKey(name, weekStr) { return `dnd-draft-${name}-${weekStr}`; }

function saveDraft(name, weekStr, cells) {
  localStorage.setItem(draftKey(name, weekStr), JSON.stringify([...cells]));
}

function loadDraft(name, weekStr) {
  try {
    const raw = localStorage.getItem(draftKey(name, weekStr));
    return raw ? new Set(JSON.parse(raw)) : null;
  } catch { return null; }
}

function clearDraft(name, weekStr) {
  localStorage.removeItem(draftKey(name, weekStr));
}

function getAllDrafts(name) {
  const prefix = draftKey(name, '');
  const drafts = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith(prefix)) {
      const weekStr = key.slice(prefix.length);
      const cells = loadDraft(name, weekStr);
      if (cells && cells.size > 0) drafts.push({ weekStr, cells });
    }
  }
  return drafts;
}

function countDrafts(name, excludeWeekStr) {
  return getAllDrafts(name).filter(d => d.weekStr !== excludeWeekStr).length;
}

// HEAT COLOR
// ─────────────────────────────────────────────────────────────

function heatColor(count, total) {
  if (count === 0) return '#1c2738';
  const t = total === 1 ? 1 : count / total;
  const r = Math.round(144 + (13  - 144) * t);
  const g = Math.round(202 + (71  - 202) * t);
  const b = Math.round(249 + (161 - 249) * t);
  return `rgb(${r},${g},${b})`;
}

function goToInput() {
  state.page = 'input';
  history.pushState({ page: 'input' }, '', '#availability');
  render();
  loadInputData();
}

let _inputLoadSeq = 0;

async function loadInputData() {
  if (!state.name) return;
  const seq    = ++_inputLoadSeq;
  const weekStr  = weekDateStrs(state.weekMonday)[0];
  const dateStrs = weekDateStrs(state.weekMonday);
  const tz       = resolveTimezone(state.timezone);
  state.inputLoading = true;
  render();
  try {
    const fileData = await ghReadChar(state.name);
    if (seq !== _inputLoadSeq) return; // stale response — a newer week was requested
    const draft = loadDraft(state.name, weekStr);
    if (draft !== null) {
      state.selectedCells = draft;
    } else {
      const entry = fileData[weekStr];
      state.selectedCells.clear();
      if (entry && !entry.unavailable && entry.utcSlots) {
        entry.utcSlots.forEach(ms => {
          const slot = utcToSlot(ms, tz, dateStrs);
          if (slot) state.selectedCells.add(`${slot.dayIndex}-${slot.hour}`);
        });
      }
    }
  } catch (_) { /* leave grid blank on error */ }
  state.inputLoading = false;
  render();
}

function goToResults() {
  state.loadStatus = 'loading';
  state.loadError  = '';
  state.ghData     = [];
  state.saveStatus = 'idle';
  state.saveError  = '';
  state.page = 'results';
  history.pushState({ page: 'results' }, '', '#schedule');
  render();
  loadResultsData();
}

async function loadResultsData() {
  const weekStr = weekDateStrs(state.weekMonday)[0];
  try {
    state.ghData     = await ghReadAllChars(weekStr);
    state.loadStatus = 'idle';
  } catch (e) {
    state.loadStatus = 'error';
    state.loadError  = e.message;
  }
  render();
}

        const newHtml = buildTzSearchResults();
        const temp = document.createElement('div');
        temp.innerHTML = newHtml;
        const newResults = temp.firstChild;
        if (old) old.replaceWith(newResults || document.createTextNode(''));
        else if (newResults) wrap.insertAdjacentElement('afterend', newResults);
        // Update the button state
        const btn = q('#btn-enter');
        if (btn) {
          const ready = state.name && state.timezone;
          btn.disabled = !ready;
          btn.innerHTML = ready ? `Enter as ${escHtml(state.name)} →` : 'Select a character &amp; timezone to continue';
        }
        // Re-attach tz result item handlers
        document.querySelectorAll('[data-tz-val]').forEach(item => {
          item.addEventListener('click', () => {
            state.timezone = item.dataset.tzVal;
            state.tzSearch = '';
            state.setupError = '';
            render();
          });
        });
      }
    });
    // Restore focus position
    tzInput.focus();
    tzInput.setSelectionRange(tzInput.value.length, tzInput.value.length);
  }

  // Tz result items
  document.querySelectorAll('[data-tz-val]').forEach(item => {
    item.addEventListener('click', () => {
      state.timezone = item.dataset.tzVal;
      state.tzSearch = '';
      state.setupError = '';
      render();
    });
  });

  // Enter button → show confirmation screen
  const btnEnter = q('#btn-enter');
  if (btnEnter) {
    btnEnter.addEventListener('click', () => {
      if (!state.name) { state.setupError = 'Please pick a character.'; render(); return; }
      if (!state.timezone) { state.setupError = 'Please set your timezone.'; render(); return; }
      state.confirming = true;
      render();
    });
  }

  // Confirmation screen buttons
  q('#btn-confirm-back')?.addEventListener('click', () => {
    state.confirming = false;
    render();
  });
  q('#btn-confirm-yes')?.addEventListener('click', () => {
    state.confirming = false;
    savePrefs(state.name, state.timezone);
    goToInput();
  });

  // GitHub token save
  q('#btn-save-token')?.addEventListener('click', () => {
    const val = q('#inp-token')?.value.trim();
    if (!val) return;
    setGHToken(val);
    render();
  });
  q('#inp-token')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') q('#btn-save-token')?.click();
  });
}

// ─────────────────────────────────────────────────────────────
// INPUT PAGE
// ─────────────────────────────────────────────────────────────

function buildInputPage() {
  const dateStrs = weekDateStrs(state.weekMonday);
  const isTGAP = state.name === 'The Great and Powerful';

  const dayHeaders = dateStrs.map((ds, i) =>
    `<div class="day-header">${DAYS_SHORT[i]}<span class="day-date">${dayLabel(ds)}</span></div>`
  ).join('');

  let rows = '';
  for (let h = 0; h < 24; h++) {
    let cells = `<div class="time-label">${fmtHour(h)}</div>`;
    for (let d = 0; d < 7; d++) {
      const k = `${d}-${h}`;
      cells += `<div class="cell${state.selectedCells.has(k)?' selected':''}" data-k="${k}"></div>`;
    }
    rows += `<div class="grid-row">${cells}</div>`;
  }

  return `<div class="page">
  <header>
    <div class="header-left">
      <h1>📅 Availability</h1>
      <p>Select hours you're free — click &amp; drag to mark a range</p>
    </div>
    <div class="player-badge${isTGAP?' is-tgap':''}" id="btn-switch-char">
      <span class="badge-dot"></span>
      ${escHtml(state.name)}
    </div>
  </header>

  <div class="week-nav">
    <button id="btn-prev-week">← Prev</button>
    <span>${weekLabel(state.weekMonday)}</span>
    <button id="btn-next-week">Next →</button>
  </div>

  ${state.inputLoading ? `<p class="hint" style="color:var(--accent)">⏳ Loading your saved availability…</p>` : `<p class="hint">Drag to select. Drag on a selected cell to deselect.</p>`}

  <div class="grid-container">
    <div class="grid-header">
      <div class="time-label-header"></div>
      ${dayHeaders}
    </div>
    <div class="grid-body${state.inputLoading ? ' loading' : ''}" id="grid-body">${rows}</div>
  </div>

  ${(function(){ const n = countDrafts(state.name, weekDateStrs(state.weekMonday)[0]); return n > 0 ? `<p class="hint" style="color:var(--accent)">📋 ${n} other week${n>1?'s':''} saved locally — Submit will push all of them to GitHub.</p>` : ''; })()}
  <div class="actions">
    <button class="btn btn-unavailable" id="btn-unavailable">😴 Unavailable This Week</button>
    <button class="btn btn-secondary" id="btn-clear">Clear All</button>
    <button class="btn btn-secondary" id="btn-view-schedule">View Group Schedule →</button>
    <button class="btn btn-primary" id="btn-submit">Submit &amp; View Schedule →</button>
  </div>
</div>`;
}

// ─────────────────────────────────────────────────────────────
// RESULTS PAGE
// ─────────────────────────────────────────────────────────────

function buildResultsPage() {
  const dateStrs = weekDateStrs(state.weekMonday);
  const tz       = resolveTimezone(state.viewTimezone);
  const isTGAP   = state.name === 'The Great and Powerful';

  const tzOptions = TZ_DATA.map(t =>
    `<option value="${escHtml(t.value)}"${state.viewTimezone===t.value?' selected':''}>${escHtml(t.label)}</option>`
  ).join('');

  const header = `<header>
    <div class="header-left">
      <h1>🗓 Group Schedule</h1>
      <p>Darker = more people available</p>
    </div>
    <div class="player-badge${isTGAP?' is-tgap':''}" id="btn-switch-char">
      <span class="badge-dot"></span>${escHtml(state.name)}
    </div>
  </header>`;

  const weekNav = `<div class="week-nav">
    <button id="btn-prev-week">← Prev</button>
    <span>${weekLabel(state.weekMonday)}</span>
    <button id="btn-next-week">Next →</button>
  </div>`;

  // Loading state
  if (state.loadStatus === 'loading') {
    return `<div class="page">${header}${weekNav}
    <div class="results-loading"><div class="spinner"></div>Loading schedule from GitHub…</div></div>`;
  }

  // Error state
  if (state.loadStatus === 'error') {
    return `<div class="page">${header}${weekNav}
    <div class="results-error">
      <strong>Couldn't load schedule</strong><br>${escHtml(state.loadError)}
      <br><button id="btn-retry">Retry</button>
    </div>
    <div class="actions"><button class="btn btn-secondary" id="btn-back">← Edit My Availability</button></div>
    </div>`;
  }

  // Normal state — build heatmap from state.ghData
  const subs         = state.ghData;
  const availForHeat = subs.filter(s => !s.unavailable);
  const unavailSubs  = subs.filter(s => s.unavailable);
  const total        = availForHeat.length;

  const heat = Array.from({length:7}, () => Array(24).fill(0));
  availForHeat.forEach(sub => {
    sub.utcSlots.forEach(ms => {
      const slot = utcToSlot(ms, tz, dateStrs);
      if (slot) heat[slot.dayIndex][slot.hour]++;
    });
  });

  const dayHeaders = dateStrs.map((ds, i) =>
    `<div class="day-header">${DAYS_SHORT[i]}<span class="day-date">${dayLabel(ds)}</span></div>`
  ).join('');

  let rows = '';
  for (let h = 0; h < 24; h++) {
    let cells = `<div class="time-label">${fmtHour(h)}</div>`;
    for (let d = 0; d < 7; d++) {
      const count = heat[d][h];
      const tip = total > 0 ? `${count}/${total} available` : 'No data yet';
      cells += `<div class="cell heat-cell" style="background:${heatColor(count,total)}" data-tip="${tip}"></div>`;
    }
    rows += `<div class="grid-row">${cells}</div>`;
  }

  const tags = availForHeat.length
    ? availForHeat.map(s => {
        const cls = s.name === 'The Great and Powerful' ? ' is-tgap' : '';
        return `<span class="submitter-tag${cls}">${escHtml(s.name)}</span>`;
      }).join('')
    : '<span class="no-submissions">No availability submitted yet.</span>';

  const unavailSection = unavailSubs.length
    ? `<div class="unavailable-section">
        <span class="meta-label">Can't make it this week (${unavailSubs.length})</span>
        ${unavailSubs.map(s=>`<span class="unavailable-tag">${escHtml(s.name)}</span>`).join('')}
       </div>` : '';

  const legendHtml = [0,.25,.5,.75,1].map(t => {
    const r=Math.round(144+(13-144)*t), g=Math.round(202+(71-202)*t), b=Math.round(249+(161-249)*t);
    return `<div class="legend-swatch" style="background:${t===0?'#1c2738':`rgb(${r},${g},${b})`}"></div>`;
  }).join('');

  const saveBar = state.saveStatus === 'saving'
    ? `<div class="save-status saving"><div class="spinner"></div>Saving to GitHub…</div>`
    : state.saveStatus === 'error'
    ? `<div class="save-status error">⚠ ${escHtml(state.saveError)}</div>`
    : '';

  return `<div class="page">
  ${header}
  <div class="results-meta">
    <div class="submitters">
      <span class="meta-label">Submitted (${total})</span>${tags}
    </div>
    <div class="view-tz-row">
      <label>View as:</label>
      <select id="view-tz">
        <option value="">Auto (${escHtml(Intl.DateTimeFormat().resolvedOptions().timeZone)})</option>
        ${tzOptions}
      </select>
    </div>
  </div>
  ${unavailSection}
  <div class="legend">
    <span>None</span><div class="legend-scale">${legendHtml}</div><span>All</span>
  </div>
  ${weekNav}
  <div class="grid-container">
    <div class="grid-header"><div class="time-label-header"></div>${dayHeaders}</div>
    <div class="grid-body">${rows}</div>
  </div>
  ${saveBar}
  <div class="actions">
    <button class="btn btn-secondary" id="btn-back">← Edit My Availability</button>
    <button class="btn btn-danger" id="btn-reset">
      ${isTGAP ? '☠️ Clear All Data' : 'Remove My Availability'}
    </button>
  </div>
</div>`;
}

// ─────────────────────────────────────────────────────────────
// ATTACH HANDLERS
// ─────────────────────────────────────────────────────────────

function attachHandlers() {
  if (state.page === 'setup') { attachSetupHandlers(); return; }

  // Shared: character badge → back to setup
  const badge = q('#btn-switch-char');
  if (badge) badge.addEventListener('click', () => { navigate('setup'); });

  // Week nav (shared)
  const shiftWeek = (dir) => {
    if (state.page === 'input' && state.selectedCells.size > 0) {
      const leaving = weekDateStrs(state.weekMonday)[0];
      const save = confirm(`Save your selections for ${weekLabel(state.weekMonday)} before switching weeks?\n\nOK = save locally   Cancel = discard`);
      if (save) {
        saveDraft(state.name, leaving, state.selectedCells);
      } else {
        clearDraft(state.name, leaving);
      }
    }
    state.weekMonday = getMondayOf(new Date(state.weekMonday.getTime() + dir * 7 * 86400000));
    if (state.page === 'input') {
      state.selectedCells.clear(); render(); loadInputData();
    }
    else { state.loadStatus = 'loading'; state.ghData = []; render(); loadResultsData(); }
  };
  q('#btn-prev-week')?.addEventListener('click', () => shiftWeek(-1));
  q('#btn-next-week')?.addEventListener('click', () => shiftWeek(+1));

  if (state.page === 'input') attachInputHandlers();
  else attachResultsHandlers();
}

function attachInputHandlers() {
  q('#btn-clear')?.addEventListener('click', () => { state.selectedCells.clear(); render(); });
  q('#btn-view-schedule')?.addEventListener('click', () => goToResults());
  q('#btn-submit')?.addEventListener('click', handleSubmit);
  q('#btn-unavailable')?.addEventListener('click', async () => {
    if (!confirm(`Mark ${state.name} as unavailable this week?`)) return;
    const weekStr = weekDateStrs(state.weekMonday)[0];
    const tz = resolveTimezone(state.timezone);
    state.selectedCells.clear();
    showResultsOptimistic({ name: state.name, timezone: tz, utcSlots: [], unavailable: true });
    try {
      await ghWriteChar(state.name, weekStr, { timezone: tz, utcSlots: [], unavailable: true });
      await loadResultsData();
    } catch (e) {
      state.loadStatus = 'error';
      state.loadError  = e.message;
      render();
    }
  });

  const body = q('#grid-body');
  if (!body) return;

  body.addEventListener('mousedown', e => {
    const cell = e.target.closest('[data-k]');
    if (!cell) return;
    e.preventDefault();
    const k = cell.dataset.k;
    state.dragging = true;
    state.dragMode = !state.selectedCells.has(k);
    applyCell(k, state.dragMode);
  });

  body.addEventListener('mouseover', e => {
    if (!state.dragging) return;
    const cell = e.target.closest('[data-k]');
    if (cell) applyCell(cell.dataset.k, state.dragMode);
  });

  // mouseup on document (not just grid) to end drag
  document.addEventListener('mouseup', () => { state.dragging = false; });
}

function applyCell(k, selecting) {
  if (selecting) state.selectedCells.add(k);
  else state.selectedCells.delete(k);
  const el = document.querySelector(`[data-k="${k}"]`);
  if (el) el.classList.toggle('selected', selecting);
}

function showResultsOptimistic(myEntry) {
  // Show results immediately with the player's own data, before GitHub confirms
  state.ghData = [...state.ghData.filter(e => e.name !== state.name), myEntry];
  state.loadStatus = 'idle';
  state.loadError  = '';
  state.saveStatus = 'idle';
  state.saveError  = '';
  state.page = 'results';
  history.pushState({ page: 'results' }, '', '#schedule');
  render();
}

async function handleSubmit() {
  if (!state.selectedCells.size) { alert('Select at least one time slot.'); return; }
  const tz       = resolveTimezone(state.timezone);
  const dateStrs = weekDateStrs(state.weekMonday);
  const weekStr  = dateStrs[0];
  const utcSlots = [];
  state.selectedCells.forEach(k => {
    const [d, h] = k.split('-').map(Number);
    utcSlots.push(localToUTC(dateStrs[d], h, tz));
  });

  // Collect all saved drafts for other weeks + current week
  const otherDrafts = getAllDrafts(state.name).filter(d => d.weekStr !== weekStr);

  showResultsOptimistic({ name: state.name, timezone: tz, utcSlots, unavailable: false });
  try {
    // Write current week
    await ghWriteChar(state.name, weekStr, { timezone: tz, utcSlots, unavailable: false });
    clearDraft(state.name, weekStr);
    // Write all other saved drafts in parallel
    await Promise.all(otherDrafts.map(({ weekStr: ws, cells }) => {
      const wDateStrs = weekDateStrs(getMondayFromStr(ws));
      const wSlots = [...cells].map(k => {
        const [d, h] = k.split('-').map(Number);
        return localToUTC(wDateStrs[d], h, tz);
      });
      return ghWriteChar(state.name, ws, { timezone: tz, utcSlots: wSlots, unavailable: false })
        .then(() => clearDraft(state.name, ws));
    }));
    await loadResultsData();
  } catch (e) {
    state.loadStatus = 'error';
    state.loadError  = e.message;
    render();
  }
}

function attachResultsHandlers() {
  q('#btn-back')?.addEventListener('click', () => { goToInput(); });
  q('#btn-retry')?.addEventListener('click', () => { state.loadStatus = 'loading'; render(); loadResultsData(); });

  q('#btn-reset')?.addEventListener('click', async () => {
    const weekStr = weekDateStrs(state.weekMonday)[0];
    if (state.name === 'The Great and Powerful') {
      const pw = prompt('Enter the DM password to clear all data for this week:');
      if (pw === null) return;
      if (pw !== '1234') { alert('Incorrect password.'); return; }
      state.saveStatus = 'saving'; render(); attachHandlers();
      try {
        await ghClearAllForWeek(weekStr);
        state.selectedCells.clear();
        await loadResultsData();
      } catch (e) {
        state.saveStatus = 'error'; state.saveError = e.message;
        render(); attachHandlers();
      }
    } else {
      if (!confirm(`Remove your availability (${state.name}) from this week?`)) return;
      state.saveStatus = 'saving'; render(); attachHandlers();
      try {
        await ghDeleteWeek(state.name, weekStr);
        state.saveStatus = 'idle';
        goToInput();
      } catch (e) {
        state.saveStatus = 'error'; state.saveError = e.message;
        render(); attachHandlers();
      }
    }
  });

  q('#view-tz')?.addEventListener('change', e => { state.viewTimezone = e.target.value; render(); attachHandlers(); });
}

// ─────────────────────────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────────────────────────

function fmtHour(h) {
  if (h === 0)  return '12 AM';
  if (h < 12)   return `${h} AM`;
  if (h === 12) return '12 PM';
  return `${h - 12} PM`;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function q(sel) { return document.querySelector(sel); }

// ─────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────

(function initFromURL() {
  const hash = location.hash.slice(1);
  const page = HASH_TO_PAGE[hash];
  if (page && page !== 'setup' && state.name) {
    state.page = page;
  } else {
    state.page = 'setup';
  }
  history.replaceState({ page: state.page }, '', '#' + PAGE_TO_HASH[state.page]);
  if (state.page === 'results') {
    state.loadStatus = 'loading';
    render();
    loadResultsData();
  } else {
    render();
  }
}());
</script>
